{% extends "base.html" %}
{% block title %}Suggest New Group — sso.pdhc{% endblock %}
{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <div class="card">
        <h2>Suggest New Group</h2>
        <p class="text-muted mb-2">Propose a new group for SU admin approval.</p>
        <form method="post" action="/suggest-group">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="proposed_name">Group Name</label>
                <input type="text" id="proposed_name" name="proposed_name" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" required
                       list="category-suggestions"
                       placeholder="e.g. planning, request, analysis…">
                <datalist id="category-suggestions">
                    <option value="planning">
                    <option value="request">
                    <option value="provider">
                    <option value="analysis">
                </datalist>
                <small class="text-muted">Free-form label (#60). Does not grant phase access.</small>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Submit Proposal</button>
        </form>
    </div>
</div>
{% endblock %}
