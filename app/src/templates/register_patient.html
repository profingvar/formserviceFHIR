{% extends "base.html" %}
{% block title %}Register Patient — sso.pdhc{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 2rem auto;">
    <div class="card">
        <h2>Patient Registration</h2>
        <form method="post" action="/register-patient">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8">
                <p class="hint">Minimum 8 characters</p>
            </div>
            <div class="form-group">
                <label for="personnummer">Personnummer</label>
                <input type="text" id="personnummer" name="personnummer" required pattern="\d{12}" maxlength="12">
                <p class="hint">12 digits (YYYYMMDDXXXX)</p>
            </div>
            <div class="form-group">
                <label for="organisation_guid">Organisation</label>
                <select id="organisation_guid" name="organisation_guid" required>
                    <option value="">Select organisation...</option>
                    {% for org in organisations %}
                        <option value="{{ org.organisation_guid }}">{{ org.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Register</button>
        </form>
        <p class="text-muted text-center mt-2" style="font-size:0.85rem;">
            Already registered? <a href="/login">Login</a>
        </p>
    </div>
</div>
{% endblock %}
